<div class="p-8 max-2-[400px] flex flex-col">

    <div class="flex justify-between">
        <div>
            <h2 class="text-2xl font-medium mb-1">Sign in</h2>
            <p class="text-sm text-gray-500">Sign in to your account to continue shopping</p>
        </div>
        <button mat-icon-button tabindex="-1" class="-mt-2 -mt-2" mat-dialog-close>
            <mat-icon>close</mat-icon>
        </button>
    </div>
    <form class="mt-6" [formGroup]="signInForm" (ngSubmit)="signIn()">
        <mat-form-field class="w-full mb-4">
            <input matInput formControlName="email" type="email" placeholder="Enter your username">
            <mat-icon matPrefix>email</mat-icon>
        </mat-form-field>

        <mat-form-field class="w-full mb-6">
            <input matInput formControlName="password" [type]="passwordVisible() ? 'text' : 'password'"
                placeholder="Enter your password">
            <mat-icon matPrefix>lock</mat-icon>
            <button matSuffix mat-icon-button type="button" type="button" (click)="togglePasswordVisibility()">
                <mat-icon>
                    {{ passwordVisible() ? 'visibility_off' : 'visibility' }}
                </mat-icon>
            </button>
        </mat-form-field>
        <button mat-flat-button class="w-full">Sign in</button>
    </form>

    <p class="text-sm text-gray-500 mt-2 text-center">
        Don't have an account?
        <a class="text-blue-600 cursor-pointer" (click)="openSignUpDialog()">Sign up</a>
    </p>

</div>
