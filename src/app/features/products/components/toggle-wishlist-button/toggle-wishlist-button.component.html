<button class="!p-0 !leading-none flex items-center justify-center w-full h-full rounded-full" mat-icon-button
    (click)=" toggleWishlist(product())">
    <mat-icon [class]="store.isInWishlist()(product().id) ? '!text-red-500' : '!text-gray-400'">
        {{ store.isInWishlist()(product().id) ? 'favorite' : 'favorite_border' }}
    </mat-icon>
</button>
