<div appViewPanel>
    <div class="flex items-start gap-4">
        <img [src]="review().userImageUrl" [alt]="review().userName" class="w-10 h-10 rounded-full" />
        <div>
            <div class="text-lg font-semibold">{{review().userName}}</div>
            <div class="flex items-center mb-1">
                <app-start-rating [rating]="review().rating" />
                <div class="text-sm text-gray-500"> ({{review().reviewDate | date: 'dd/MM/yyyy'}})</div>
            </div>
            <div class="text-sm font-semibold mb-1">{{review().reviewTitle}}</div>
            <div class="text-sm text-gray-500">{{review().comment}}</div>
        </div>
    </div>
</div>
