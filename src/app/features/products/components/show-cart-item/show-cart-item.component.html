<div class="grid grid-cols-3 grid-cols-[3fr_1fr_1fr]">
    <div class="flex items-center gap-4">
        <img [src]="item().product.imageUrl" alt="product.name"
            [style.view-transition-name]="'product-image-' + item().product.id"
            class="w-24 h-24 object-contain rounded-lg border border-black-300">
        <div>
            <div class="text-gray-900 text-lg font-semibold">{{item().product.name}}</div>
            <div class="text-gray-600 text-lg">${{item().product.price}}"></div>
        </div>
    </div>
    <app-qty-selector [quantity]="item().quantity"
        (qtyUpdated)="store.setItemQuantity({ productId: item().product.id, quantity: $event })" />

    <div class="flex flex-col items-end">
        <div class="text-right font-semibold text-lg">
            ${{total()}}
        </div>
        <div class="flex -me-3">
            <button mat-icon-button class="cursor-pointer" (click)="store.moveToWishlist(item().product)">
                <mat-icon>favorite_border</mat-icon>
            </button>
            <button mat-icon-button class="text-red-500 cursor-pointer" (click)="store.removeFromCart(item().product)">
                <mat-icon>delete</mat-icon>
            </button>
        </div>


    </div>

</div>
