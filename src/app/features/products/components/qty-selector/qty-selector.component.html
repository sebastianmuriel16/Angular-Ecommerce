<div class="flex items-center gap-3">
    <div class="inline-flex items-center">
        <button mat-icon-button [disabled]="quantity() === 1" (click)="updateQty(-1)">
            <mat-icon>remove</mat-icon>
        </button>
        <div class=" px-3 py-2">
            {{quantity()}}
        </div>
        <button mat-icon-button (click)="updateQty(1)">
            <mat-icon>add</mat-icon>
        </button>
    </div>
