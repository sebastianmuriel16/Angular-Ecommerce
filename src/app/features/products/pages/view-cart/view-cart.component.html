<div class="mx-auto max-w-[1200px] py-6 px-4">
    <app-back-button class="mb-6" [navigateTo]="['products', 'all']">
        Continue shopping
    </app-back-button>
    <h1 class="text-3xl font-extrabold mb-4">Shopping cart</h1>

    <app-tease-wishlist class="mb-6 block" />

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <div class="lg:col-span-2">
            <app-list-cart-items />
        </div>
        <div>

            <app-summarize-order>
                <ng-container actionButtons>
                    <button mat-flat-button class="w-full mt-6 py-6" (click)="store.proceedToCheckout()">
                        Proced to checkout
                    </button>
                </ng-container>
            </app-summarize-order>

        </div>
    </div>

</div>
