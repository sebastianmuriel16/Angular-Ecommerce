<div class="mx-auto max-w-[1200px] py-6">
    <app-back-button [clearSearch]="false" class="mb-6" [navigateTo]="backRoute()">
        Continue shopping
    </app-back-button>

    @if(store.selectedProduct(); as product){
    <div class="flex gap-8 mb-8">
        <img [src]="product.imageUrl" alt="product.name" class="w-[500px] h-[550px] object-contain"
            [style.view-transition-name]="'product-image-' + product.id">
        <div class="flex-1">
            <app-product-info [product]="product" />
        </div>
    </div>
    <app-view-reviews [product]="product" />

    }



</div>
