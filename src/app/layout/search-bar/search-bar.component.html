<div class="w-full max-w-lg flex items-center bg-white border border-gray-200 rounded-lg px-4 py-2 shadow-sm transition-all duration-200
 focus-within:ring-2 focus-within:ring-blue-200 focus-within:border-blue-400">

    <mat-icon matPrefix class="text-gray-400 mr-3 cursor-pointer">
        search
    </mat-icon>
    <input [(ngModel)]="searchQuery" (keydown)=" onSearch($event)" matInput type="text" placeholder="Search products..."
        class="flex-1 bg-transparent outline-none text-gray-700 text-sm placeholder-gray-400">

    @if(store.searchQuery()) {
    <button (click)="cancelSearch()"
        class="rounded-sm hover:bg-gray-200 transition-colors cursor-pointer text-gray-500 ml-2 flex items-center justify-center">
        <mat-icon class="text-sm">close</mat-icon>
    </button>
    }

</div>
