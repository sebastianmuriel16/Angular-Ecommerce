<div class="flex items-center gap-2">
    <button mat-icon-button routerLink="/my-wishlist" [matBadge]="store.wishlistItems().length"
        [matBadgeHidden]="store.wishlistCount() === 0">
        <mat-icon>favorite</mat-icon>
    </button>
    <button mat-icon-button routerLink="/cart" [matBadge]="store.cartCount()"
        [matBadgeHidden]="store.cartCount() === 0">
        <mat-icon>shopping_cart</mat-icon>
    </button>

    @if(store.user(); as user){
    <button mat-icon-button [matMenuTriggerFor]="userMenu">
        <img [src]="user.imageUrl" alt="user.name" class="w-8 h-8 rounded-full">
    </button>

    <mat-menu #userMenu="matMenu" xPosition="before">
        <div class="flex flex-col px-3 min-w-[200px]">
            <span class="text-sm font-medium">{{user.name}}</span>
            <span class="text-xs text-gray-500">{{user.email}}</span>
        </div>
        <mat-divider></mat-divider>

        <button class="!min-h-[32px]" mat-menu-item (click)="store.signOut()">
            <mat-icon>logout</mat-icon>
            <span>Sign out</span>
        </button>

    </mat-menu>

    }@else {
    <button mat-button (click)="openSignInDialog()">
        Sign in
    </button>
    <button mat-flat-button (click)="openSignUpDialog()">
        Sign Up
    </button>}

</div>
